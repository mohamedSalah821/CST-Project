<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in</title>
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/login.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    </head>
<body>
        <div id="navbar-placeholder"></div>

    <div class="container my-5 ">
       <div class="px-4 py-5 rounded-2 bg-white shadow-card">
         <div class="row">
                <h4 class="text-center text-primary">Sign in to your account</h4>

                  <div class="col-md-6">
                <div class="img ">
                    <img src="./assets/images/Sign in.gif" alt="Sign up " class="w-100">
                </div>
            </div>
             <div class="col-md-6">
                <div class="content w-100">
                    <h6>Welcome Back</h6>
                        <p class="text-secondary">Enter your email and password to login.</p>
                    <form id="loginForm" class="mt-3">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="you@example.com" >
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3 position-relative">
                        <label>Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password">
                        <div class="invalid-feedback"></div>
                        
                        <i class="fa-solid fa-eye toggle-password" data-target="password"></i>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2" id="loginBtn" disabled>
                        <span id="btnText">Sign In</span>
                        <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>

                    </button>

                <div class="mt-3 text-center">
                    <span class="text-secondary">Don't have an account? </span>
                    <a href="./register.html" class="text-primary">Sign up</a>
                    
                </div>
                </form>

                </div>
            </div>



          

        </div>
       </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
    <script src="./assets/js/Auth/guard.js"></script>

    <script type="module" src="./assets/js/firebase.js"></script>

    <script src="./assets/js/Auth/login.js"></script>

        <script src="./assets/js/navbar.js"></script>

        <script>
      loadNavbar("");
    </script>

<script>
  redirectIfLoggedIn();
</script>
</body>
</html>
