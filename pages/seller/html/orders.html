<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Dashboard - Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="./../css/sidebar.css">
  <link rel="stylesheet" href="./../css/orders.css">
  <link rel="stylesheet" href="./../../../assets/css/footer.css">
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="main-content p-4">
<!-- ✅ Header like Products -->
<div class="page-header">
  <div>
    <h2 class="page-title">Manage Orders</h2>
    <p class="page-subtitle">Here you can manage your orders easily!</p>
  </div>

 
</div>

<!-- ✅ Filters bar like Products -->
<div class="filters-card mt-3">
  <div class="filters-row">
    <div class="filter-item search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="orderSearch" type="text" placeholder="Search orders..." />
    </div>

    <div class="filter-item">
      <i class="fa-solid fa-layer-group"></i>
      <select id="statusFilter">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
      </select>
    </div>

    <div class="filter-item">
      <i class="fa-solid fa-sort"></i>
      <select id="sortFilter">
        <option value="date_desc">Newest</option>
        <option value="date_asc">Oldest</option>
        <option value="total_desc">Total High</option>
        <option value="total_asc">Total Low</option>
      </select>
    </div>

    <button class="btn-clear" id="clearFiltersBtn" type="button">
      <i class="fa-solid fa-rotate-left me-2"></i>Clear
    </button>
  </div>
</div>

    <!-- Card -->
    <div class="cardx mt-3">
      <div class="cardx__head">
        <div>
          <h5 class="m-0">Recent Orders</h5>
          <p class="text-muted mb-0 small">View and manage incoming orders</p>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-borderless align-middle mb-0">
          <thead class="table-head">
            <tr>
              <th class="text-nowrap">Order ID</th>
              <th>Customer</th>
              <th class="text-nowrap">Date</th>
              <th class="text-nowrap">Total</th>
              <th>Status</th>
              <th class="text-end">Action</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ✅ View Order Modal -->
  <div class="modal fade" id="viewOrderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 class="modal-title m-0">Order Details</h5>
            <div class="small text-muted">Order: <span id="mOrderId" class="fw-bold"></span></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="border rounded p-3 h-100">
                <div class="fw-bold mb-2">Customer</div>
                <div id="mCustomer"></div>
                <div class="small text-muted mt-2">Date: <span id="mDate"></span></div>
              </div>
            </div>

            <div class="col-md-6">
              <div class="border rounded p-3 h-100">
                <div class="fw-bold mb-2">Shipping Address</div>
                <div id="mAddress" class="text-muted"></div>
              </div>
            </div>

            <div class="col-12">
              <div class="border rounded p-3">
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <div class="fw-bold">Items</div>
                  <div class="fw-bold">Total: <span id="mTotal"></span></div>
                </div>

                <div class="table-responsive">
                  <table class="table table-sm align-middle mb-0">
                    <thead>
                      <tr>
                        <th>Product</th>
                        <th class="text-nowrap">Price</th>
                        <th class="text-nowrap">Qty</th>
                        <th class="text-nowrap">Line Total</th>
                      </tr>
                    </thead>
                    <tbody id="mItems"></tbody>
                  </table>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="border rounded p-3">
                <div class="fw-bold mb-2">Status</div>
                <div class="d-flex gap-2 align-items-center flex-wrap">
                  <select id="mStatus" class="form-select" style="max-width:220px;">
                    <option value="pending">pending</option>
                    <option value="processing">processing</option>
                    <option value="shipped">shipped</option>
                    <option value="delivered">delivered</option>
                  </select>

                  <button id="saveStatusBtn" class="btn btn-primary">
                    Save Status
                  </button>

                  <span id="statusMsg" class="small text-muted"></span>
                </div>
              </div>
            </div>

          </div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-light" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

      <div id="footer-placeholder" style="width: 82%; position: absolute; right: 0px;" ></div>


     <script src="../../../assets/js/Auth/guard.js"></script>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
  fetch("sidebar.html")
    .then(res => res.text())
    .then(async (data) => {
      document.getElementById("sidebar-container").innerHTML = data;

      // ✅ بعد ما sidebar يتحط، حمّل سكربت الحساب

      const mod = await import("../js/sidebar-account.js");
      await mod.initSidebarAccount();
    });
</script>
 <script type="module" src="../js/seller-order.js"></script>
 <script src="../../../assets/js/footer.js"></script>

</body>
</html>
