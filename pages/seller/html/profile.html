<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seller Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>

<body>
  <div id="sidebar-container"></div>

  <main class="main-content p-4">
    <div class="container profile-wrap">

      <div class="panel-card">
        <!-- Header -->
        <div class="panel-head">
          <div>
            <h4 class="panel-title">Account Settings</h4>
            <p class="panel-sub">Update your email & password securely</p>
          </div>

          <button class="btn-ghost" type="button" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
          </button>
        </div>

        <!-- Hero -->
        <div class="profile-hero">
          <img id="profileImg"
               src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
               alt="profile">

          <div class="hero-info">
            <p class="hero-name mb-1" id="sellerName">Seller</p>
            <p class="hero-meta mb-0" id="sellerEmailText">—</p>
          </div>
        </div>

        <!-- Body -->
        <div class="panel-body">

          <!-- Email -->
          <div class="split-one">
            <div>
              <label class="form-label mb-1">Email</label>
              <div class="input-groupx">
                <span class="ig-icon"><i class="fa-solid fa-envelope"></i></span>
                <input id="editEmail" type="email" class="form-controlx" placeholder="example@mail.com">
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- Password row -->
          <div class="split">
            <!-- Old Password -->
            <div>
              <label class="form-label mb-1">Current Password</label>
              <div class="input-groupx">
                <span class="ig-icon"><i class="fa-solid fa-key"></i></span>
                <input id="oldPassword" type="password" class="form-controlx" placeholder="Enter current password">
                <button class="ig-btn" type="button" id="toggleOld" title="Show/Hide">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>

            <!-- New Password -->
            <div>
              <label class="form-label mb-1">New Password</label>
              <div class="input-groupx">
                <span class="ig-icon"><i class="fa-solid fa-lock"></i></span>
                <input id="editPassword" type="password" class="form-controlx" placeholder="New password (min 6 chars)">
                <button class="ig-btn" type="button" id="togglePass" title="Show/Hide">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Confirm فقط (شيلنا tips) -->
          <div class="split mt-2">
            <div>
              <label class="form-label mb-1">Confirm Password</label>
              <div class="input-groupx">
                <span class="ig-icon"><i class="fa-solid fa-lock"></i></span>
                <input id="confirmPassword" type="password" class="form-controlx" placeholder="Confirm new password">
                <button class="ig-btn" type="button" id="toggleConfirm" title="Show/Hide">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>

            <!-- عمود فاضي عشان الجريد يفضل متوازن (اختياري) -->
            <div></div>
          </div>

          <div id="profileMsg" class="msg d-none mt-3"></div>

          <!-- Actions -->
          <div class="actions">
            <button class="btn btn-save flex-grow-1" id="saveProfileBtn">
              <i class="fa-solid fa-floppy-disk me-2"></i>Save Changes
            </button>
            <button class="btn btn-reset" type="button" id="resetBtn">Reset</button>
          </div>

        </div>
      </div>

    </div>
  </main>

     <script src="../../assets/js/Auth/guard.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Sidebar loader -->
  <script type="module">
    fetch("sidebar.html")
      .then(res => res.text())
      .then(async (data) => {
        document.getElementById("sidebar-container").innerHTML = data;
        const mod = await import("./../js/sidebar-account.js");
        await mod.initSidebarAccount();
      })
      .catch(err => console.error("Sidebar load error:", err));
  </script>

  <!-- Page script -->
  <script type="module" src="./../js/seller-profile.js"></script>

  <script>
  requireAuth(["seller"]);
</script>
</body>
</html>
