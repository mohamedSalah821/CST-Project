<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/sidebar.css">
<style>
    #profileImg{
  border: 4px solid rgba(15,23,42,.08);
}

.input-group-text{
  background:#f8fafc;
}
</style>
</head>

<body>

<div id="sidebar-container"></div>

<main class="main-content p-4">

  <div class="container" style="max-width:520px;">
    
    <!-- Profile Image -->
    <div class="text-center mb-3">
      <img id="profileImg"
           src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
           alt="profile"
           class="rounded-circle shadow"
           style="width:120px;height:120px;object-fit:cover;">
      <h5 class="mt-3 mb-0">Edit Account</h5>
      <p class="text-muted small mb-0">Update your email & password</p>
    </div>

    <div class="card shadow-sm rounded-3 p-4">
      
      <!-- Email -->
      <label class="form-label mb-1">Email</label>
      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-solid fa-envelope"></i>
        </span>
        <input id="editEmail"
               type="email"
               class="form-control"
               placeholder="example@mail.com">
      </div>

      <!-- New Password -->
      <label class="form-label mb-1">New Password</label>
      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-solid fa-lock"></i>
        </span>
        <input id="editPassword"
               type="password"
               class="form-control"
               placeholder="Leave empty if no change">
        <button class="btn btn-outline-secondary" type="button" id="togglePass">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <!-- Confirm Password -->
      <label class="form-label mb-1">Confirm Password</label>
      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-solid fa-lock"></i>
        </span>
        <input id="confirmPassword"
               type="password"
               class="form-control"
               placeholder="Confirm new password">
        <button class="btn btn-outline-secondary" type="button" id="toggleConfirm">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <div id="profileMsg" class="small text-danger d-none mb-2"></div>

      <button class="btn btn-primary w-100" id="saveProfileBtn">
        Save Changes
      </button>

    </div>
  </div>

</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="../../../assets/js/seller-profile.js"></script>

 <script type="module">
  fetch("sidebar.html")
    .then(res => res.text())
    .then(async (data) => {
      document.getElementById("sidebar-container").innerHTML = data;

      // ✅ بعد ما sidebar يتحط، حمّل سكربت الحساب
      const mod = await import("./../../../assets/js/sidebar-account.js");
      await mod.initSidebarAccount();
    
    });
</script>
</script>
<script>
    const pass = document.getElementById("editPassword");
const confirm = document.getElementById("confirmPassword");

document.getElementById("togglePass")?.addEventListener("click", () => {
  pass.type = pass.type === "password" ? "text" : "password";
});

document.getElementById("toggleConfirm")?.addEventListener("click", () => {
  confirm.type = confirm.type === "password" ? "text" : "password";
});

<!-- سكربت صفحة البروفايل (تعديل) -->
</script>
<script type="module" src="./../../../assets/js/seller-profile.js"></script>

</body>
</html>
