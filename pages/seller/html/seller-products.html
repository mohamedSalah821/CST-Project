<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="./../css/sidebar.css">
  <link rel="stylesheet" href="./../css/products.css">
  <style>
    /* يخليهم دايمًا جنب بعض */
    .action-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
      /* يمنع النزول تحت بعض */
    }

    /* يصغر الأزرار في الموبايل */
    @media (max-width: 576px) {
      .action-buttons .btn {
        padding: 4px 6px;
      }
    }
  </style>
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="main-content p-4">

    <!-- Page Header -->
    <div class="page-header mb-4">
      <div>
        <h2 class="page-title">Manage Products</h2>
        <p class="page-sub"> Here you can Manage Your Product Easly !</p>
      </div>

      <div class="header-actions">

        <button id="bulkDeleteBtn" class="btn btn-gradient-danger btn-animated" disabled>
          <i class="fa-solid fa-trash-can me-2"></i>Delete Selected
        </button>

        <a id="addCategoryBtn" href="seller-category.html" class="btn btn-gradient-secondary btn-animated">
          <i class="fa-solid fa-tags me-2"></i>Manage Categories
        </a>

        <button id="addproduct" class="btn btn-gradient-primary btn-animated" data-bs-toggle="modal"
          data-bs-target="#productModal">
          <i class="fa-solid fa-plus me-2"></i>Add Product
        </button>

      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar-modern mb-4">

      <div class="toolbar-group">

        <div class="search-modern">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="searchInput" type="text" placeholder="Search products..." />
        </div>

        <div class="select-modern">
          <i class="fa-solid fa-layer-group"></i>
          <select id="categoryFilter">
            <option value="all">All Categories</option>
          </select>
        </div>

        <div class="select-modern">
          <i class="fa-solid fa-sort"></i>
          <select id="priceSort">
            <option value="none">Price</option>
            <option value="asc">Low → High</option>
            <option value="desc">High → Low</option>
          </select>
        </div>

        <div class="select-modern">
          <i class="fa-solid fa-flag"></i>
          <select id="flagFilter">
            <option value="all">Flag</option>
            <option value="flagged">Flagged</option>
            <option value="ok">Not Flagged</option>
          </select>
        </div>

      </div>

      <button id="clearFiltersBtn" class="btn btn-clear-modern">
        <i class="fa-solid fa-rotate-left me-2"></i>Clear
      </button>

    </div>
    <!-- Table -->
    <div class="table-card">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th style="width:42px;">
                <input class="form-check-input" type="checkbox" id="selectAll">
              </th>
              <th>Product</th>
              <th>Description</th>
              <th>Category</th>
              <th>Price</th>
              <th>Quantity</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="productTable"></tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Enter Data  Modal -->
  <div class="modal fade" id="productModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="text" id="name" class="form-control mb-2" placeholder="Product Name">
          <select id="categorySelect" class="form-select mb-2">
            <option value="" selected disabled>Select Category</option>
          </select>


          <input type="number" id="price" class="form-control mb-2" placeholder="Price">
          <input type="number" id="quntity" class="form-control mb-2" placeholder="Quntity">
          <textarea id="description" class="form-control mb-2" rows="3" placeholder="Description"></textarea>
          <input type="file" id="image" class="form-control mb-2" accept="image/*" multiple>
          <!-- previews grid -->
          <div id="previews" class="d-flex flex-wrap gap-2 mt-2"></div>

        </div>

        <div class="modal-footer">
          <button class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete all modal -->
  <div class="modal fade" id="bulkDeleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Are you sure you want to delete <strong id="bulkCount">0</strong> product(s)?
          <div class="text-muted small mt-2">This action can’t be undone.</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button id="confirmBulkDeleteBtn" class="btn btn-danger">
            Delete
          </button>
        </div>
      </div>
    </div>
  </div>


  <!-- ✅ Toast -->
  <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="appToast" class="toast align-items-center text-white bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastText">Done</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Add Category Modal -->
  <div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Category</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input type="text" id="categoryName" class="form-control" placeholder="Category name (e.g. clothes)">
          <div class="text-muted small mt-2">Tip: use simple names like clothes, electronics…</div>
        </div>

        <div class="modal-footer">
          <button class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button id="saveCategoryBtn" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>


  <script type="module" src="../js/seller-products.js"></script>
  <script type="module">
    fetch("sidebar.html")
      .then(res => res.text())
      .then(async (data) => {
        document.getElementById("sidebar-container").innerHTML = data;

        // ✅ بعد ما sidebar يتحط، حمّل سكربت الحساب
        const mod = await import("./../js/sidebar-account.js");
        await mod.initSidebarAccount();
      });
  </script>
</body>

</html>
