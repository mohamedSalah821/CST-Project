<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./../css/dashboard.css">
    <link rel="stylesheet" href="./../css/sidebar.css">
    <link rel="stylesheet" href="./../../../assets/css/footer.css">


</head>

<body>

    <div >
        

            <div id="sidebar-container"></div>

      
        <!-- 🔹 Main Content -->
       <main class="main-content p-4">
  <!-- Header -->
  <div class="mb-4">
    <h1 class="page-title mb-1">Welcome back,</h1>
    <p class="page-subtitle mb-0">Here's Your Current Sales Overiew</p>
  </div>

  <div class="container-fluid px-0">
    <!-- Stat cards -->
    <div class="row g-4">
      <div class="col-12 col-md-6 col-xl-3">
        <div class="stat-card">
          <div>
            <div class="stat-label">TOTAL REVENUE</div>
            <div class="stat-value" id="totalRevenue">0 </div>
          </div>
          <div class="stat-icon bg-purple">
            <i class="fa-solid fa-dollar-sign"></i>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-xl-3">
        <div class="stat-card">
          <div>
            <div class="stat-label">TOTAL ORDERS</div>
            <div class="stat-value" id="totalOrders">0</div>
          </div>
          <div class="stat-icon bg-red">
            <i class="fa-solid fa-cart-shopping"></i>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-xl-3">
        <div class="stat-card">
          <div>
            <div class="stat-label">TOTAL PRODUCTS</div>
            <div class="stat-value"  id="totalProducts">0</div>
          </div>
          <div class="stat-icon bg-green">
            <i class="fa-solid fa-cube"></i>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6 col-xl-3">
        <div class="stat-card">
          <div>
            <div class="stat-label">AVG ORDER VALUE</div>
            <div class="stat-value" id="avgOrderValue">0</div>
          </div>
          <div class="stat-icon bg-pink">
            <i class="fa-solid fa-chart-line"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts row (cards) -->
 
  <div class="row g-4 mt-1">

  <!-- category Chart -->
  <div class="col-12 col-lg-6">
    <div class="panel-card">
      <h5 class="panel-title">Products by Category</h5>
      <div class="panel-body">
        <canvas id="productsChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Revenue Chart -->
  <div class="col-12 col-lg-6">
    <div class="panel-card">
      <h5 class="panel-title">Monthly Revenue</h5>
      <div class="panel-body">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
  </div>

</div>

<div class="row g-4 mt-2">
  <div class="col-12">
    <div class="panel-card">
      <h5 class="panel-title">Top Selling Products</h5>
      <div class="panel-body">
        <div id="topProductsList"></div>
      </div>
    </div>
  </div>
</div>
<br><br><br><br>
</main>

    <div id="footer-placeholder" style="width: 82%; position: absolute; right: 0px;" ></div>


 <script src="../../../assets/js/footer.js"></script>
<script>
    loadFooter("../../../")
</script>


    </div>
    
     <script src="../../../assets/js/Auth/guard.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./../js/Seller-dashboard.js"></script>

    <script>
  requireAuth(["seller"]);
</script>

</body>




</html>
