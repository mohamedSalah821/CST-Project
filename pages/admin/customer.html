<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="stylesheet" href="../../assets/css/admin-style.css">
    <link rel="stylesheet" href="../../assets/css/footer.css">
    <link rel="stylesheet" href="./css/customer.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-speedometer2"></i>
            <h4>Admin Panel</h4>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link ">
                <i class="bi bi-house-door"></i>
                <span>Dashboard</span>
            </a>

            <a href="products.html" class="nav-link">
                <i class="bi bi-box-seam"></i>
                <span>Products</span>
            </a>

            <a href="users.html" class="nav-link">
                <i class="bi bi-people"></i>
                <span>Users</span>
            </a>
            <a class="nav-link active " href="./customer.html">
                <i class="bi bi-chat-dots"></i> Customer Service
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="admin-profile.html" class="nav-link">
                <i class="bi bi-person-badge-fill"></i>
                <span>My Profile</span>
            </a>

            <a href="#" onclick="logout(event)" class="nav-link logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Mobile Toggle Button -->
        <button class="sidebar-toggle d-md-none" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>

        <!-- Page Header -->
        <header class="page-header py-3">
            <div>
                <h2 class="mb-1">Customer Service</h2>
                <p class="text-muted mb-0">Manage customer messages and inquiries</p>
            </div>
        </header>

        <div class="container-fluid px-4 py-4">

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-primary">
                            <i class="bi bi-chat-dots"></i>
                        </div>
                        <div class="stat-details">
                            <h6>Total Messages</h6>
                            <h3 id="totalMessagesCount">0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-warning">
                            <i class="bi bi-envelope"></i>
                        </div>
                        <div class="stat-details">
                            <h6>Unread Messages</h6>
                            <h3 id="unreadMessagesCount">0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-success">
                            <i class="bi bi-check-circle"></i>
                        </div>
                        <div class="stat-details">
                            <h6>Read Messages</h6>
                            <h3 id="readMessagesCount">0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-icon bg-info">
                            <i class="bi bi-people"></i>
                        </div>
                        <div class="stat-details">
                            <h6>Unique Users</h6>
                            <h3 id="uniqueUsersCount">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bulk Actions Bar -->
            <div id="bulkActionsBar" style="display:none; position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 2px solid #dee2e6; padding: 15px; margin-bottom: 15px;" class="d-flex align-items-center justify-content-between shadow-sm rounded">
                <div>
                    <strong><span id="selectedCount">0</span> message(s) selected</strong>
                </div>
                <div class="btn-group">
                    <button onclick="bulkMarkAsRead()" class="btn btn-success btn-sm">
                        <i class="bi bi-check-all me-1"></i>Mark as Read
                    </button>
                    <button onclick="bulkMarkAsUnread()" class="btn btn-outline-warning btn-sm">
                        <i class="bi bi-envelope me-1"></i>Mark as Unread
                    </button>
                    <button onclick="bulkDeleteMessages()" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash me-1"></i>Delete Selected
                    </button>
                </div>
            </div>

            <div class="mb-3 d-flex align-items-center gap-2">
                <input type="checkbox" 
                    class="form-check-input" 
                    id="selectAllCheckbox" 
                    onchange="selectAllMessages()">
                <label for="selectAllCheckbox" class="form-check-label">
                    Select All
                </label>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="btn btn-primary active" id="filterAll" onclick="filterMessages('all')">
                    <i class="bi bi-envelope me-1"></i>All
                </button>
                <button class="btn btn-outline-warning" id="filterUnread" onclick="filterMessages('unread')">
                    <i class="bi bi-envelope me-1"></i>Unread
                </button>
                <button class="btn btn-outline-success" id="filterRead" onclick="filterMessages('read')">
                    <i class="bi bi-check-circle me-1"></i>Read
                </button>
            </div>

            <!-- Search Bar -->
            <div class="mb-4 mt-3">
                <input type="text" 
                       class="form-control" 
                       id="searchMessage" 
                       placeholder="🔍 Search by name, email, or message...">
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer">
                <!-- Messages will be loaded here -->
            </div>

        </div>
    </div>

    <!-- ✅ Reply Modal (في مكانه الصح خارج الـ container) -->
    <div class="modal fade" id="replyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-reply me-2"></i>Reply to Message</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">To: <strong id="replyToEmail"></strong></p>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" id="replySubject" class="form-control" 
                               value="Re: Your message to us">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea id="replyBody" class="form-control" rows="5" 
                                  placeholder="Write your reply..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                   <button class="btn btn-primary" id="sendReplyBtn">
                        <i class="bi bi-send me-1"></i>Send Reply
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder" style="width: 82%; position: absolute; right: 0px;" ></div>

    <!-- Scripts -->
<script src="../../assets/js/Auth/guard.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script type="module" src="../../assets/js/admin-customer.js"></script>
    <script src="../../assets/js/footer.js"></script>

    
    <script>
  requireAuth(["admin"]);
</script>
</body>
</html>
