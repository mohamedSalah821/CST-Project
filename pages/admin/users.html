<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <link rel="stylesheet" href="./css/users.css">

</head>
<body>
    
    <div class="d-flex">
       <button class="btn d-md-none position-fixed top-0 start-0 m-2 shadow-sm" 
        id="sidebarToggle" style="z-index: 1100; background: #071848; color: white;">
       <i class="bi bi-list fs-3"></i>
       </button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <i class="bi bi-speedometer2"></i>
        <h4>Admin Panel</h4>
    </div>
    
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link ">
            <i class="bi bi-house-door"></i>
            <span >Dashboard</span>
        </a>
        <a href="products.html" class="nav-link">
            <i class="bi bi-box-seam"></i>
            <span>Products</span>
        </a>
        <a href="users.html" class="nav-link active">
            <i class="bi bi-people"></i>
            <span>Users</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="admin-profile.html" class="nav-link">
        <i class="bi bi-person-badge-fill"></i>
        <span>My Profile</span>
    </a>
        <a href="../../login.html" class="nav-link logout">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </a>
    </div>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content flex-grow-1">
            <header class="page-header d-flex flex-column flex-md-row justify-content-between align-items-center">
                <div class="header-text-part">
                    <h1 class="mb-1">Users Management</h1>
                    <p class="text-muted mb-0">Manage all registered users</p>
                </div>
                <div class="header-button-part mt-3 mt-md-0">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                        <i class="bi bi-plus-lg me-2"></i>Add User
                    </button>
                </div>
            </header>
            <div class="container-fluid px-4 py-4">
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-primary">
                                <i class="bi bi-people"></i>
                            </div>
                            <div class="stat-details">
                                <h6>Total Users</h6>
                                <h3 id="totalUsersCount">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-success">
                                <i class="bi bi-check-circle"></i>
                            </div>
                            <div class="stat-details">
                                <h6>Active Users</h6>
                                <h3 id="activeUsersCount">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-warning">
                                <i class="bi bi-lock"></i>
                            </div>
                            <div class="stat-details">
                                <h6>Blocked Users</h6>
                                <h3 id="blockedUsersCount">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-info">
                                <i class="bi bi-person-plus"></i>
                            </div>
                            <div class="stat-details">
                                <h6>New This Month</h6>
                                <h3 id="newUsersCount">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <h5 class="mb-0">
                                    <i class="bi bi-people me-2"></i>
                                    All Users
                                </h5>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0">
                                        <i class="bi bi-search"></i>
                                    </span>
                                    <input type="text" class="form-control border-0 bg-light" 
                                           id="searchUser" placeholder="Search by email or name...">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>User</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Status</th>
                                        <th class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                            <p class="mt-2 text-muted">Loading users...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="userEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="userRole" class="form-label">User Role</label>
                            <select id="userRole" class="form-select">
                                <option value="" selected disabled>Choose Role...</option>
                                <option value="customer">Customer</option>
                                <option value="seller">Seller</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addUser()">Add User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script type="module" src="../../assets/js/admin-users.js"></script>
 
</body>
</html>
