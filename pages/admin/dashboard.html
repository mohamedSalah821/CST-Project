<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar Toggle Button (Mobile) -->
    <button class="btn d-md-none position-fixed top-0 start-0 m-2 shadow-sm"
            id="sidebarToggle"
            style="z-index: 1100; background: #071848; color: white;">
        <i class="bi bi-list fs-3"></i>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-speedometer2"></i>
            <h4>Admin Panel</h4>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link active">
                <i class="bi bi-house-door"></i>
                <span>Dashboard</span>
            </a>

            <a href="products.html" class="nav-link">
                <i class="bi bi-box-seam"></i>
                <span>Products</span>
            </a>

            <a href="users.html" class="nav-link">
                <i class="bi bi-people"></i>
                <span>Users</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="admin-profile.html" class="nav-link">
                <i class="bi bi-person-badge-fill"></i>
                <span>My Profile</span>
            </a>

            <a href="../../login.html" class="nav-link logout">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content flex-grow-1">

        <!-- Header -->
        <header class="page-header py-3">
            <div class="ms-sm-5">
                <h1 class="mb-1">Dashboard</h1>
                <p class="text-muted mb-0 text-black">Welcome back</p>
            </div>
        </header>

        <div class="container-fluid px-4 py-3">

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">

                <div class="col-xl-3 col-md-6">
                    <div class="dashboard-card card-users">
                        <div class="card-body d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="card-title">Total Users</h6>
                                <h2 class="card-value mb-0" id="totalUsers">0</h2>
                            </div>
                            <div class="card-icon">
                                <i class="bi bi-people"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="dashboard-card card-products">
                        <div class="card-body d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="card-title">Total Products</h6>
                                <h2 class="card-value mb-0" id="totalProducts">0</h2>
                            </div>
                            <div class="card-icon">
                                <i class="bi bi-box-seam"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="dashboard-card card-orders">
                        <div class="card-body d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="card-title">Total Orders</h6>
                                <h2 class="card-value mb-0" id="totalOrders">0</h2>
                            </div>
                            <div class="card-icon">
                                <i class="bi bi-cart"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="dashboard-card card-sales">
                        <div class="card-body d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="card-title">Total Sales</h6>
                                <h2 class="card-value mb-0" id="totalSales">$0</h2>
                            </div>
                            <div class="card-icon">
                                <i class="bi bi-currency-dollar"></i>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Charts -->
                        <div class="row g-4 mb-4">
                    <div class="col-lg-4 col-md-6">
                        <div class="card p-3 shadow-sm h-100">
                            <h5 class="mb-3">Users Distribution</h5>
                            <div style="position: relative; height: 300px;">
                                <canvas id="usersChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-6">
                        <div class="card p-3 shadow-sm h-100">
                            <h5 class="mb-3">Products by Category</h5>
                            <div style="position: relative; height: 300px;">
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4 col-md-12">
                        <div class="card p-3 shadow-sm h-100">
                            <h5 class="mb-3">Monthly Revenue</h5>
                            <div style="position: relative; height: 300px; width: 100%;">
                                <canvas id="revenueChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            <!-- Most Sold Products Table -->
            <div class="row">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 py-3">
                            <h5 class="mb-0">
                                <i class="bi bi-trophy text-warning me-2"></i>
                                Most Sold Products
                            </h5>
                        </div>

                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>#</th>
                                            <th>Product</th>
                                            <th>Category</th>
                                            <th>Price</th>
                                            <th>Sold</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>

                                    <tbody id="mostSoldProductsTable">
                                        <tr>
                                            <td colspan="6" class="text-center py-4">
                                                <div class="spinner-border text-primary"></div>
                                                <p class="mt-2 text-muted mb-0">
                                                    Loading products...
                                                </p>
                                            </td>
                                        </tr>
                                    </tbody>

                                </table>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../../assets/js/admin-dashboard.js"></script>

</body>
</html>
