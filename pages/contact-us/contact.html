<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="./contact.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

</head>

<body>

<!-- ================= Top Section ================= -->
<div class="Top overlay">
    <div class="container">
        <div class="inner text-center">
            <div class="row">
                <div class="col-12">
                    <h2>Contact Us</h2>
                    <ul class="list">
                        <li><a href="../../index.html">Home</a></li>
                        <li class="ms-2 me-2">
                            <i class="fa-solid fa-angle-right"></i>
                        </li>
                        <li class="active">Contact Us</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ================= Contact Us Section ================= -->
<section class="contact-us section ">
    <div class="container">

        <div class="inner shadow-card">
            <div class="row">

                <!-- ===== Contact Form ===== -->
                <div class="col-lg-6">
                    <div class="contact-us-form">
                        <h2>Contact Us</h2>
                        <p>If you have any questions, feel free to contact us.</p>

                        <form class="form">
                            <div class="row">

                                <div class="col-lg-6">
                                    <div class="form-group">
                                        <input type="text" name="name" placeholder=" Name" >
                                    </div>
                                </div>

                                <div class="col-lg-6">
                                    <div class="form-group">
                                        <input type="text" name="phone" placeholder="Phone Number" >
                                        <small class="text-danger phone-error"></small>

                                    </div>
                                </div>
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <input type="email" name="email" placeholder="Valid Email" >

                                    </div>
                                </div>

                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <textarea name="message" placeholder="Your Message" ></textarea>
                                        <small class="text-danger message-error"></small> 


                                    </div>
                                </div>

                                <div class="col-lg-12">
                                    <div class="form-group ">
                                        <button class="btn bg-sec" type="submit">Send Message</button>
                                    </div>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>

                <!-- ===== Map ===== -->
                <div class="col-lg-6">
                    <div class="contact-us-left p-2">
                        <div id="myMap">
                            
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3426.156688858894!2d30.999359175041192!3d30.826275381106765!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f7c9006c953031%3A0x657b1b2e39db545b!2sITI%20Tanta!5e0!3m2!1sen!2seg!4v1772112273671!5m2!1sen!2seg"
                                style="border:0;" 
                                allowfullscreen loading="lazy" 
                                referrerpolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        
    </div>
</section>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>
<script type="module" src="../../assets/js/firebase.js"></script>
<script src="./contact.js"></script>

</body>
</html>
