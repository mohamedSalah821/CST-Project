<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist – ShopFlow</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/css/navbar.css" />
    <link rel="stylesheet" href="../../assets/css/footer.css" />
    <link rel="stylesheet" href="../../assets/css/cart.css" />
    <link rel="stylesheet" href="../../assets/css/wishlist.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
    padding-top: 120px;
}
    </style>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <!-- Header -->
    <div class="wl-header">
      <div class="container d-flex align-items-center gap-3">
        <div class="wl-header-icon">
          <i class="fa-solid fa-heart"></i>
        </div>
        <div>
          <h1 class="mb-0 fw-bold fs-2">My Wishlist</h1>
          <p class="mb-0 opacity-75" id="wl-count-text">Loading...</p>
        </div>
      </div>
    </div>

    <main class="container py-5">
      <!-- Loading -->
      <div id="wl-loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Loading your wishlist...</p>
      </div>

      <!-- Empty -->
      <div id="wl-empty" class="d-none text-center py-5">
        <div class="wl-empty-icon">
          <i class="fa-regular fa-heart"></i>
        </div>
        <h3 class="fw-bold mb-2">Your wishlist is empty</h3>
        <p class="text-muted mb-4">Save the products you love and find them here!</p>
        <a href="customer-products.html" class="btn btn-primary px-5 py-2 rounded-3">
          <i class="fas fa-shopping-bag me-2"></i> Browse Products
        </a>
      </div>

      <!-- Grid -->
      <div id="wl-grid" class="row g-4 d-none"></div>
    </main>

    <div id="footer-placeholder"></div>


    <script src="../../assets/js/Auth/guard.js"></script>

    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/footer.js"></script>
    <script type="module" src="../../assets/js/wishlist-page.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      loadNavbar("../../");
      loadFooter("../../");
    </script>

    <script>
  requireAuth(["customer"]);
</script>
  </body>
</html>
