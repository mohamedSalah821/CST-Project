<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart - ShopFlow</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/css/navbar.css" />
    <link rel="stylesheet" href="../../assets/css/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/cart.css" />
    <link rel="stylesheet" href="../../assets/css/checkout.css" />
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <!-- Page Content -->
    <main class="page-main">
      <div class="container">
        <!-- Page Title -->
        <div class="page-title-block">
          <h1 class="page-title">Shopping Cart</h1>
          <p id="cart-subtitle" class="page-subtitle">Your cart is empty</p>
        </div>

        <!-- ===== EMPTY STATE ===== -->
        <div id="empty-state">
          <div class="empty-icon-wrap">
            <i class="fas fa-shopping-bag"></i>
          </div>
          <h4 class="empty-heading">Your cart is empty</h4>
          <p class="empty-text">Start adding some products to your cart</p>
          <a href="customer-products.html" class="btn btn-primary-action">
            <i class="fas fa-arrow-left me-2"></i> Continue Shopping
          </a>
        </div>

        <!-- ===== CART WITH ITEMS (hidden until items exist) ===== -->
        <div id="cart-has-items" class="d-none">
          <div class="row g-4 align-items-start">
            <!-- Left: Items List -->
            <div class="col-lg-8">
              <div id="cart-items-list"></div>

              <!-- Actions Row -->
              <div class="cart-actions-row">
                <a href="customer-products.html" class="btn-text-link">
                  <i class="fas fa-arrow-left me-1"></i> Continue Shopping
                </a>
                <button class="btn-text-link text-danger" onclick="clearCart()">
                  Clear Cart
                </button>
              </div>
            </div>

            <!-- Right: Summary -->
            <div class="col-lg-4">
              <div class="summary-card">
                <h5 class="summary-card-title">Order Summary</h5>

                <div class="summary-line">
                  <span>Subtotal</span>
                  <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-line">
                  <span>Shipping</span>
                  <span class="text-success fw-semibold">Free</span>
                </div>
                <div class="summary-line">
                  <span>Tax (8%)</span>
                  <span id="summary-tax">$0.00</span>
                </div>

                <div class="summary-divider"></div>

                <div class="summary-total-line">
                  <span>Total</span>
                  <span id="summary-total">$0.00</span>
                </div>

                <a
                  href="checkout.html"
                  class="btn btn-primary-action btn-block"
                >
                  Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Clear Cart Confirmation Modal -->
    <div
      class="modal fade"
      id="clearCartModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
          <div class="modal-body text-center p-5">
            <div class="clear-modal-icon mb-3">
              <i class="fas fa-trash-alt"></i>
            </div>
            <h5 class="fw-bold mb-2">Clear your cart?</h5>
            <p class="text-muted mb-4">
              All items will be removed. This action cannot be undone.
            </p>
            <div class="d-flex gap-3 justify-content-center">
              <button
                class="btn btn-outline-secondary rounded-3 px-4"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <button
                class="btn btn-danger rounded-3 px-4"
                id="confirm-clear-btn"
              >
                Yes, clear it
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Scripts - order matters -->
     <script src="../../assets/js/Auth/guard.js"></script>

    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/footer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../assets/js/cart.js"></script>
    <script>
      loadNavbar("../../");
      loadFooter("../../");
    </script>

    <script>
  requireAuth(["customer"]);
</script>
  </body>
</html>
