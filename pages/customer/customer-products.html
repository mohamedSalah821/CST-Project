<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopFlow | Product Catalog</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../assets/css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/customer-products.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <header class="py-5 mb-4 bg-white shadow-sm">
        <div class="container">
            <h1 class="fw-bold text-dark mb-4">Product Catalog</h1>
            <p class="text-muted">Browse our full collection of products</p>
            
            <div class="row g-3 align-items-center mb-4 mt-3">
                <div class="col-md-6 col-lg-5">
                    <div class="input-group search-input-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
                        <span class="input-group-text"><i class="fas fa-search text-muted"></i></span>
                    </div>
                </div>
                
                <div class="col-md-auto">
                    <select class="form-select" aria-label="Sort by">
                        <option selected>Sort by: Featured</option>
                        <option value="price-asc">Price: Low to High</option>
                        <option value="price-desc">Price: High to Low</option>
                    </select>
                </div>
            </div>

            <div class="filter-btn-group d-flex flex-wrap" id="categoryFilters">
                <button class="btn btn-outline-secondary px-3 py-1 fs-6 active" data-category="all">All</button>
                <button class="btn btn-outline-secondary px-3 py-1 fs-6" data-category="electronics">Electronics</button>
                <button class="btn btn-outline-secondary px-3 py-1 fs-6" data-category="jewelery">Jewelery</button>
                <button class="btn btn-outline-secondary px-3 py-1 fs-6" data-category="men's clothing">Men's Clothing</button>
                <button class="btn btn-outline-secondary px-3 py-1 fs-6" data-category="women's clothing">Women's Clothing</button>
            </div>
        </div>
    </header>

    <main class="container pb-5">
        <p class="text-muted mb-4"><span id="productCount">0</span> products found</p>
        <div class="row g-4" id="productsContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </main>

    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        loadNavbar('../../');
    </script>
</body>
</html>
