<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Catalog</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/css/navbar.css" />
    <link rel="stylesheet" href="../../assets/css/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/customer-products.css" />
    <link rel="stylesheet" href="../../assets/css/cart.css" />
      <link rel="stylesheet" href="../../assets/css/wishlist.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <header class="py-5 mb-2 bg-white shadow-sm">
      <div class="container">
        <h1 class="fw-bold text-dark mb-3">Product Catalog</h1>
        <p class="text-muted">Browse our full collection of products</p>

        <div class="row g-3 align-items-center mb-4 mt-2">
          <div class="col-md-6 col-lg-5">
            <div class="input-group search-input-group">
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search products..."
              />
              <span class="input-group-text"
                ><i class="fas fa-search text-muted"></i
              ></span>
            </div>
          </div>

          <div class="col-md-auto ms-auto">
            <select class="form-select" aria-label="Sort by">
              <option selected>Sort by: Featured</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
            </select>
          </div>
        </div>

        <div
          class="filter-btn-group d-flex flex-wrap"
          id="categoryFilters"
        ></div>
      </div>
    </header>

    <main class="container pb-5 mt-4">
      <div
        id="saleCarousel"
        class="carousel slide sale-carousel mb-5 d-none"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner" id="carouselInner"></div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#saleCarousel"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#saleCarousel"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>

      <p class="text-muted mb-4">
        <span id="productCount">0</span> products found
      </p>
      <div class="row g-4" id="productsContainer">
        <div class="col-12 text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../assets/js/Auth/guard.js"></script>


    <script src="../../assets/js/navbar.js"></script>
    <script src="../../assets/js/footer.js"></script>
    <script type="module" src="../../assets/js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      loadNavbar("../../");
      loadFooter("../../");
    </script>

    <script>
  requireAuth(["customer"]);
</script>
  </body>
</html>
