<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details</title>
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/css/navbar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/product-details.css" />
      <link rel="stylesheet" href="../../assets/css/wishlist.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="bg-light py-3 border-bottom">
      <div class="container">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0" id="breadcrumb">
            <li class="breadcrumb-item">
              <a href="customer-products.html" class="text-decoration-none"
                >Catalog</a
              >
            </li>
            <li class="breadcrumb-item text-muted" aria-current="page">
              Loading...
            </li>
          </ol>
        </nav>
      </div>
    </div>

    <main class="container py-5" id="productDetailsContainer">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Loading product details...</p>
      </div>
    </main>

    <!-- Add to Cart Success Modal -->
    <div
      class="modal fade"
      id="addToCartModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow">
          <div class="modal-body text-center p-5">
            <div
              class="mb-3"
              style="
                width: 70px;
                height: 70px;
                background: #d1fae5;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto;
              "
            >
              <i class="fas fa-check fs-2" style="color: #16a34a"></i>
            </div>
            <h5 class="fw-bold mb-2">Added to Cart!</h5>
            <p class="text-muted mb-4" id="modal-cart-msg">
              Item added successfully.
            </p>
            <div class="d-flex gap-3 justify-content-center">
              <button
                class="btn btn-outline-secondary rounded-3 px-4"
                data-bs-dismiss="modal"
              >
                Continue Shopping
              </button>
              <a href="cart.html" class="btn btn-primary rounded-3 px-4">
                <i class="fas fa-shopping-cart me-2"></i> View Cart
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="../../assets/js/Auth/guard.js"></script>


    <script src="../../assets/js/navbar.js"></script>
    <script type="module" src="../../assets/js/product-details.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      loadNavbar("../../");
    </script>

    <script>
  requireAuth(["customer"]);
</script>
  </body>
</html>
