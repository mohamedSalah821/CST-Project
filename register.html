<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/Register.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    </head>
<body>
        <div id="navbar-placeholder"></div>

    <div class="container my-5 ">
       <div class="px-4 py-5 rounded-2 bg-white shadow-card">
         <div class="row">
                    <h4 class="text-center text-primary">Create a new account</h4>

                    
            <div class="col-md-6">
                <div class="img ">
                    <img src="./assets/images/Sign up.gif" alt="Sign up " class="w-100">
                </div>
            </div>
            
             <div class="col-md-6">
                <div class="content w-100">
                    <h6 >Register</h6>
                    <p class="text-secondary">Fill in the details below to create your account.</p>
                    <form id="registerForm"class="mt-3 ">
                        <div class=" mb-3  ">
                            <label for="name">Full Name</label>
                            <input type="text" class="form-control " id="name" placeholder="Your Full Name" required>
                            <div class="invalid-feedback"></div>
                        </div>

                          <div class=" mb-3 ">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control " id="email" placeholder="you@example.com" required>
                            <div class="invalid-feedback"></div>
                        </div>

                         <div class="mb-3 position-relative">
                            <label>Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password">
                            <i class="fa-solid fa-eye toggle-password"
                                data-target="password"></i>
                            <div class="invalid-feedback"></div>
                            </div>

                       <div class="mb-3 position-relative">
                            <label>Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="Enter Confirm Password">
                            <i class="fa-solid fa-eye toggle-password"
                                data-target="confirmPassword"></i>
                            <div class="invalid-feedback"></div>
                            </div>



                         <div class=" mb-3">
                            <label for="accountType" class="form-label">Account Type</label>
                            <select class="form-select" id="accountType" >
                                <option value="customer" selected>Customer</option>
                                <option value="seller">Seller</option>
                                <option value="admin">Admin</option>
                            </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2"  id="registerBtn" disabled>
                            <span id="btnText">Create Account </span> 
                            <i class="fa-regular fa-hand-point-right ms-1"></i>
                            <span id="btnLoader" class="spinner-border spinner-border-sm d-none"></span>
                            </button>

                         <div class="mt-3 text-center">
                            <span class="text-secondary">Already have an account? </span>
                            <a href="./login.html" class="text-primary">Sign in</a>
                            </div>
                    </form>
                </div>
            </div>




        </div>
       </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/2.1.4/toastr.min.js"></script>

    <script type="module" src="./assets/js/firebase.js"></script>

    <script src="./assets/js/Auth/register.js"></script>

    <script src="./assets/js/navbar.js"></script>

    <script>
        loadNavbar("");
    </script>
</body>
</html>
